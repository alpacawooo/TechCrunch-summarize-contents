name: News Bot (live + slack briefing)

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run pipeline and send Slack briefing
        run: python -m news_bot.main --limit-per-source 20 --top-k 15 --output-dir output
      - name: Upload markdown artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-markdown
          path: output/*.md
